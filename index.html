<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DM8NRNQJTQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DM8NRNQJTQ');
  </script>
</head>
<body>

  <!-- Floating particles -->
  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>

  <!-- Energy burst overlay -->
  <div class="energy-burst" id="energyBurst"></div>

  <!-- Reveal light behind doors -->
  <div class="reveal-light" id="revealLight"></div>

  <!-- Door container with perspective -->
  <div class="door-scene" id="doorScene">

    <!-- Left door -->
    <div class="door door-left" id="doorLeft">
      <div class="door-face">
        <!-- Hextech ornamental border -->
        <div class="door-border"></div>
        <!-- Central rune circle -->
        <div class="rune-circle">
          <div class="rune-inner"></div>
        </div>
        <!-- Circuit lines -->
        <div class="circuit circuit-top-left"></div>
        <div class="circuit circuit-bottom-left"></div>
        <!-- Hex rivets -->
        <div class="rivet rivet-1"></div>
        <div class="rivet rivet-2"></div>
        <div class="rivet rivet-3"></div>
        <div class="rivet rivet-4"></div>
        <!-- Vertical glow strip -->
        <div class="glow-strip glow-strip-right"></div>
      </div>
    </div>

    <!-- Right door -->
    <div class="door door-right" id="doorRight">
      <div class="door-face">
        <div class="door-border"></div>
        <div class="rune-circle">
          <div class="rune-inner"></div>
        </div>
        <div class="circuit circuit-top-right"></div>
        <div class="circuit circuit-bottom-right"></div>
        <div class="rivet rivet-1"></div>
        <div class="rivet rivet-2"></div>
        <div class="rivet rivet-3"></div>
        <div class="rivet rivet-4"></div>
        <div class="glow-strip glow-strip-left"></div>
      </div>
    </div>

    <!-- Center push button -->
    <div class="push-container" id="pushContainer">
      <button class="push-btn" id="pushBtn" onclick="openDoors()">
        <span class="push-ring"></span>
        <span class="push-ring push-ring-2"></span>
        <span class="push-text">PUSH</span>
      </button>
    </div>

  </div>

  <script>
    function openDoors() {
      var btn = document.getElementById('pushBtn');
      var container = document.getElementById('pushContainer');
      var doorLeft = document.getElementById('doorLeft');
      var doorRight = document.getElementById('doorRight');
      var burst = document.getElementById('energyBurst');
      var reveal = document.getElementById('revealLight');
      var scene = document.getElementById('doorScene');

      // Disable button
      btn.disabled = true;
      btn.classList.add('activated');

      // Energy burst
      burst.classList.add('active');

      // After short delay, open doors
      setTimeout(function() {
        container.classList.add('hidden');
        doorLeft.classList.add('open');
        doorRight.classList.add('open');
        reveal.classList.add('active');
        scene.classList.add('opened');
      }, 300);

      // Redirect after animation
      setTimeout(function() {
        window.location.href = 'index2.html';
      }, 1800);
    }
  </script>

</body>
</html>
