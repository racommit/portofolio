<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DM8NRNQJTQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DM8NRNQJTQ');
  </script>
</head>
<body>

<div class="scene" id="scene">

  <!-- Light flooding from behind doors -->
  <div class="light-flood"></div>

  <!-- White-out overlay for redirect -->
  <div class="whiteout"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Left door -->
  <div class="door door-left">
    <div class="door-border"></div>
    <div class="door-border-inner"></div>
    <div class="door-ornament">
      <svg viewBox="0 0 60 200">
        <line x1="55" y1="0" x2="55" y2="200"/>
        <line x1="45" y1="20" x2="45" y2="180"/>
        <polyline points="45,60 55,50 45,40"/>
        <polyline points="45,160 55,150 45,140"/>
        <line x1="35" y1="80" x2="55" y2="80"/>
        <line x1="35" y1="120" x2="55" y2="120"/>
        <polygon points="50,95 55,100 50,105 45,100"/>
      </svg>
    </div>
  </div>

  <!-- Right door -->
  <div class="door door-right">
    <div class="door-border"></div>
    <div class="door-border-inner"></div>
    <div class="door-ornament">
      <svg viewBox="0 0 60 200">
        <line x1="5" y1="0" x2="5" y2="200"/>
        <line x1="15" y1="20" x2="15" y2="180"/>
        <polyline points="15,60 5,50 15,40"/>
        <polyline points="15,160 5,150 15,140"/>
        <line x1="5" y1="80" x2="25" y2="80"/>
        <line x1="5" y1="120" x2="25" y2="120"/>
        <polygon points="10,95 5,100 10,105 15,100"/>
      </svg>
    </div>
  </div>

  <!-- Center seam glow -->
  <div class="seam-glow"></div>

  <!-- Center interactive element -->
  <div class="center-element" id="enterBtn">
    <div class="diamond-line">
      <div class="diamond"></div>
    </div>
    <div class="enter-text">Enter</div>
  </div>

</div>

<script>
  (function() {
    var triggered = false;
    document.getElementById('enterBtn').addEventListener('click', function() {
      if (triggered) return;
      triggered = true;
      document.getElementById('scene').classList.add('opened');
      setTimeout(function() {
        window.location.href = 'index2.html';
      }, 2000);
    });
  })();
</script>

</body>
</html>
